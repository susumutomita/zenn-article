name: lint

on:
  push:
  pull_request:
    branches: ['main']

permissions:
  contents: write

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Check out the code
        # actions/checkout v4.3.1
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          submodules: true

      - uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Setup safe-chain
        run: |
          pnpm add -g --ignore-scripts @aikidosec/safe-chain@1.5.3
          safe-chain setup-ci

      - name: Install dependencies
        run: |
          make install

      - name: Lint and validate books
        run: make before_commit

  diagnose-textlint:
    if: github.event_name == 'push' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Check out the branch
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: articles/tenkacloud-ai-agent-harness

      - uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Capture diagnostics
        shell: bash
        run: |
          mkdir -p .textlint-diagnostic-temp
          set +e
          pnpm exec textlint articles/tenkacloud-ai-agent-harness.md > .textlint-diagnostic-temp/textlint-output.txt 2>&1
          status=$?
          printf '\nexit_code=%s\n' "$status" >> .textlint-diagnostic-temp/textlint-output.txt
          cp articles/tenkacloud-ai-agent-harness.md .textlint-diagnostic-temp/article-before-fix.md
          pnpm exec textlint --fix articles/tenkacloud-ai-agent-harness.md > .textlint-diagnostic-temp/textlint-fix-output.txt 2>&1
          printf '\nexit_code=%s\n' "$?" >> .textlint-diagnostic-temp/textlint-fix-output.txt
          cp articles/tenkacloud-ai-agent-harness.md .textlint-diagnostic-temp/article-after-fix.md
          git restore articles/tenkacloud-ai-agent-harness.md
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .textlint-diagnostic-temp
          git commit -m "chore: capture temporary textlint diagnostics"
          git push
